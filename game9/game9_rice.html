<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>오늘은 내가 영양사!</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Jua&display=swap');

        body { 
            font-family: 'Jua', sans-serif; margin: 0; 
            background: #fff9e6; display: flex; flex-direction: column; 
            height: 100vh; overflow: hidden; 
        }

        /* --- 설정 화면 --- */
        #setup-screen { 
            position: absolute; width: 100%; height: 100%; 
            background: linear-gradient(rgba(255, 249, 230, 0.8), rgba(255, 249, 230, 0.8)), url('kitchen_bg.jpg');
            background-size: cover; z-index: 100; display: flex; align-items: center; justify-content: center; 
        }
        .setup-card { 
            background: white; padding: 40px; border-radius: 60px; 
            border: 8px solid #ffcc99; text-align: center; 
            box-shadow: 0 20px 40px rgba(0,0,0,0.1); 
            position: relative; width: 900px;
        }
        .setup-card h1 { color: #ff8000; font-size: 2.8em; margin-bottom: 5px; }
        
        .upload-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; margin-bottom: 25px; }
        .upload-box { background: #fff5e6; border: 3px dashed #ffb366; border-radius: 20px; padding: 15px 5px; display: flex; flex-direction: column; align-items: center; }
        .upload-box label { font-size: 1.1em; color: #e67e22; margin-bottom: 10px; cursor: pointer; }
        .upload-box input { width: 80%; font-size: 0.8em; }

        /* --- 게임 메인 화면 --- */
        #game-screen { display: none; flex: 1; padding: 15px; flex-direction: column; box-sizing: border-box; }
        #game-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        #game-container { display: flex; width: 100%; height: calc(100vh - 120px); gap: 15px; }

        #food-selection { min-width: 320px; width: 25%; height: 100%; background: white; border-radius: 30px; padding: 15px; border: 4px solid #ffcc99; overflow-y: auto; }
        .image-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 12px; }
        
        .food-item { 
            width: 100%; aspect-ratio: 1/1; cursor: grab; 
            border-radius: 15px; border: 2px solid #eee; 
            overflow: hidden; display: flex; align-items: center; 
            justify-content: center; background: #fff;
            position: relative;
        }
        .food-item img { width: 100%; height: 100%; object-fit: cover; }
        .food-item.no-img::after {
            content: attr(data-name);
            position: absolute; width: 100%; height: 100%;
            background: #ffe0b3; display: flex; align-items: center;
            justify-content: center; text-align: center; padding: 5px;
            box-sizing: border-box; font-size: 1.1em; color: #d35400;
        }

        #tray-section { flex: 1; display: flex; align-items: center; justify-content: center; background: white; border-radius: 35px; border: 4px solid #b3e6ff; position: relative; overflow: hidden; }
        #tray-wrapper { position: relative; width: 1000px; height: 700px; background-image: url('tray.png'); background-size: contain; background-repeat: no-repeat; background-position: center; }

        .drop-zone { position: absolute; display: flex; align-items: center; justify-content: center; }
        .drop-zone.drag-over { background: rgba(46, 204, 113, 0.3); border-radius: 50%; }
        
        .drop-zone img:not(.topping-img) { width: 180%; height: 180%; object-fit: contain; pointer-events: none; }
        .topping-img { position: absolute; width: 40% !important; height: 40% !important; bottom: 5%; right: 5%; z-index: 50; cursor: pointer; }

        #spot-carb  { top: 400px; left: 180px; width: 250px; height: 200px; } 
        #spot-soup  { top: 400px; left: 540px; width: 250px; height: 200px; } 
        #spot-side1 { top: 100px; left: 180px; width: 150px; height: 130px; }  
        #spot-side2 { top: 90px; left: 410px; width: 150px; height: 130px; }  
        #spot-side3 { top: 100px; left: 630px; width: 150px; height: 130px; }

        #sidebar { min-width: 220px; display: flex; flex-direction: column; gap: 8px; justify-content: center; }
        .score-board { background: #ffecb3; padding: 15px; border-radius: 20px; text-align: center; font-size: 1.8em; color: #e67e22; border: 3px solid #ffcc99; }
        
        /* 알림등 스타일 */
        .light { padding: 12px; border-radius: 15px; background: #fff; font-weight: bold; text-align: center; border: 3px solid #eee; transition: 0.3s; }
        .light.perfect { background: #e6ffed; border-color: #2ecc71; color: #155724; }
        .light.warning { background: #fff3cd; border-color: #ffc107; color: #856404; } /* 노란색 불 추가 */
        .light.danger  { background: #ffe6e6; border-color: #e74c3c; color: #721c24; }

        #success-modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; padding: 40px; border-radius: 40px; border: 8px solid #ffcc99; z-index: 1000; text-align: center; width: 400px; box-shadow: 0 0 50px rgba(0,0,0,0.2); }
        .btn { padding: 15px 30px; border-radius: 50px; border: none; cursor: pointer; font-weight: bold; font-family: 'Jua'; transition: 0.2s; }
    </style>
</head>
<body>

    <div id="setup-screen">
        <div class="setup-card">
            <h1>오늘의 식단 꾸미기</h1>
            <div class="upload-grid">
                <div class="upload-box"><label>🍚 탄수화물</label><input type="file" id="in-carb" multiple accept="image/*"></div>
                <div class="upload-box"><label>🍖 단백질</label><input type="file" id="in-protein" multiple accept="image/*"></div>
                <div class="upload-box"><label>🥑 지방/토핑</label><input type="file" id="in-fat" multiple accept="image/*"></div>
                <div class="upload-box"><label>🥛 칼슘</label><input type="file" id="in-calcium" multiple accept="image/*"></div>
                <div class="upload-box"><label>🥦 무기질</label><input type="file" id="in-mineral" multiple accept="image/*"></div>
            </div>
            <button class="btn" style="background:#ff9933; color:white; width: 300px; font-size:1.5em;" onclick="startGame()">급식 시작하기!</button>
        </div>
    </div>

    <div id="game-screen">
        <div id="game-header">
            <button class="btn" style="background:#ddd;" onclick="location.reload()">◀ 처음으로</button>
            <h2 style="color: #5cacee; font-size: 2em; margin: 0;">🥗 영양소를 골고루 담아요!</h2>
            <div style="width:100px"></div>
        </div>
        <div id="game-container">
            <div id="food-selection"><div class="image-grid" id="master-list"></div></div>
            <div id="tray-section">
                <div id="tray-wrapper">
                    <div class="drop-zone" id="spot-carb"></div>
                    <div class="drop-zone" id="spot-soup"></div>
                    <div class="drop-zone" id="spot-side1"></div>
                    <div class="drop-zone" id="spot-side2"></div>
                    <div class="drop-zone" id="spot-side3"></div>
                </div>
            </div>
            <div id="sidebar">
                <div class="score-board">점수: <span id="score-val">0</span>점</div>
                <div id="light-carb" class="light">탄수화물 ⚪</div>
                <div id="light-protein" class="light">단백질 ⚪</div>
                <div id="light-fat" class="light">지방 ⚪</div>
                <div id="light-calcium" class="light">칼슘 ⚪</div>
                <div id="light-mineral" class="light">무기질 ⚪</div>
                <div id="light-salt" class="light">나트륨 ⚪</div>
            </div>
        </div>
    </div>

    <div id="success-modal">
        <h1>🎉 결과 발표 🎉</h1>
        <h2 id="final-rank" style="color:#e67e22; font-size: 2.5em; margin: 10px 0;">완벽한 영양사</h2>
        <p id="final-score" style="font-size: 1.5em; color: #666;">100점</p>
        <button class="btn" style="background:#ff9933; color:white; width: 100%; font-size: 1.2em;" onclick="resetTrayOnly()">식판 비우기</button>
    </div>

    <script src="data.js"></script>
    <script>
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playSound() {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + 0.1);
        }

        function startGame() {
            audioCtx.resume();
            const listContainer = document.getElementById('master-list');
            listContainer.innerHTML = "";
            
            if (typeof masterFoodData === 'undefined') {
                alert("data.js 파일을 찾을 수 없습니다!"); return;
            }

            for (let name in masterFoodData) {
                createFoodItem(name);
            }
            document.getElementById('setup-screen').style.display = 'none';
            document.getElementById('game-screen').style.display = 'flex';
        }

        function createFoodItem(name) {
            const list = document.getElementById('master-list');
            const type = masterFoodData[name];
            
            const container = document.createElement('div');
            container.className = 'food-item';
            container.dataset.name = name;
            container.draggable = true;
            
            const img = document.createElement('img');
            img.src = name + ".png";
            img.alt = name;

            img.onerror = function() {
                if (!this.dataset.retry) {
                    this.dataset.retry = "1";
                    this.src = name + ".PNG";
                } else {
                    container.classList.add('no-img');
                    this.style.display = "none";
                }
            };

            container.dataset.type = Array.isArray(type) ? type.join(',') : type;
            container.ondragstart = (ev) => {
                ev.dataTransfer.setData("src", img.src);
                ev.dataTransfer.setData("type", container.dataset.type);
                ev.dataTransfer.setData("isNoImg", container.classList.contains('no-img'));
                ev.dataTransfer.setData("name", name);
            };

            container.appendChild(img);
            list.appendChild(container);
        }

        document.querySelectorAll('.drop-zone').forEach(zone => {
            zone.ondragover = (e) => { e.preventDefault(); zone.classList.add('drag-over'); };
            zone.ondragleave = () => zone.classList.remove('drag-over');
            zone.ondrop = (e) => {
                e.preventDefault();
                zone.classList.remove('drag-over');
                
                const src = e.dataTransfer.getData("src");
                const typeStr = e.dataTransfer.getData("type");
                const isNoImg = e.dataTransfer.getData("isNoImg") === "true";
                const name = e.dataTransfer.getData("name");
                const isTopping = typeStr.includes('topping');
                
                if (isTopping) {
                    const oldTopping = zone.querySelector('.topping-img');
                    if (oldTopping) oldTopping.remove();
                } else {
                    zone.innerHTML = "";
                }

                if (isNoImg) {
                    const box = document.createElement('div');
                    box.innerText = name;
                    box.style.width = "80px"; box.style.height = "80px";
                    box.style.background = "#ffcc99"; box.style.borderRadius = "10px";
                    box.style.display = "flex"; box.style.alignItems = "center";
                    box.style.justifyContent = "center"; box.style.textAlign = "center";
                    box.dataset.type = typeStr;
                    zone.appendChild(box);
                } else {
                    const img = document.createElement('img');
                    img.src = src;
                    img.dataset.type = typeStr;
                    if (isTopping) img.className = 'topping-img';
                    img.onclick = (ev) => { ev.stopPropagation(); img.remove(); updateGameState(); };
                    zone.appendChild(img);
                }

                playSound();
                updateGameState();
            };
            zone.onclick = () => { zone.innerHTML = ""; updateGameState(); };
        });

        function updateGameState() {
            let counts = { carb: 0, protein: 0, fat: 0, calcium: 0, mineral: 0 };
            let saltCount = 0;
            let filledMainCount = 0;

            document.querySelectorAll('.drop-zone img, .drop-zone div').forEach(el => {
                if (el.dataset.type) {
                    if (!el.classList.contains('topping-img')) filledMainCount++;
                    el.dataset.type.split(',').forEach(t => {
                        let cleanType = t.trim();
                        if (counts[cleanType] !== undefined) counts[cleanType]++;
                        if (cleanType === 'salt') saltCount++;
                    });
                }
            });

            let score = 0;
            const labels = { carb: "탄수화물", protein: "단백질", fat: "지방", calcium: "칼슘", mineral: "무기질" };
            
            for (let t in counts) {
                const light = document.getElementById('light-' + t);
                if (counts[t] >= 3) {
                    // 영양소 3개 이상 중복 시 노란색 세모
                    score += 20; 
                    light.className = 'light warning'; 
                    light.innerHTML = labels[t] + " ⚠️"; 
                } else if (counts[t] >= 1) {
                    score += 20; 
                    light.className = 'light perfect'; 
                    light.innerHTML = labels[t] + " ✅"; 
                } else {
                    light.className = 'light'; 
                    light.innerHTML = labels[t] + " ⚪"; 
                }
            }

            const sLight = document.getElementById('light-salt');
            if (saltCount > 2) { score -= 20; sLight.className = 'light danger'; sLight.innerHTML = "나트륨 ⚠️짜요!"; }
            else if (saltCount > 0) { sLight.className = 'light perfect'; sLight.innerHTML = "나트륨 ✅"; }
            else { sLight.className = 'light'; sLight.innerHTML = "나트륨 ⚪"; }

            document.getElementById('score-val').innerText = Math.max(0, score);
            if (filledMainCount === 5) setTimeout(showResult, 800);
        }

        function showResult() {
            const score = parseInt(document.getElementById('score-val').innerText);
            let rank = "";
            
            // 점수대별 멘트 설정
            if (score >= 100) rank = "🥇 완벽한 영양사";
            else if (score >= 80) rank = "🥈 초보 영양사";
            else if (score >= 60) rank = "🥉 어린이 영양사";
            else rank = "🥕 영양사 연습생";

            document.getElementById('final-rank').innerText = rank;
            document.getElementById('final-score').innerText = score + "점";
            document.getElementById('success-modal').style.display = 'block';
        }

        function resetTrayOnly() {
            document.querySelectorAll('.drop-zone').forEach(z => z.innerHTML = "");
            document.getElementById('success-modal').style.display = 'none';
            updateGameState();
        }
    </script>
</body>
</html>

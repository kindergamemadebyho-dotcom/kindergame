<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌈 동물로 보는 어린이 MBTI 검사</title>
    <link href="https://fonts.googleapis.com/css2?family=Gaegu:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #FFF9E1;
            --main-pink: #FFB7CE;
            --main-blue: #A2D2FF;
            --main-yellow: #FFD966;
            --text-color: #444;
        }

        body {
            font-family: 'Gaegu', cursive;
            background-color: var(--bg-color);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        #game-container {
            background: rgba(255, 255, 255, 0.95);
            width: 95%;
            max-width: 550px;
            padding: 40px 30px;
            border-radius: 50px;
            border: 8px solid var(--main-yellow);
            text-align: center;
            box-shadow: 0 20px 0px #F0E2A1;
        }

        h1 { font-size: 3rem; color: #FF8BA7; margin-bottom: 20px; text-shadow: 2px 2px 0 white; }
        
        .progress-wrap { position: relative; width: 80%; margin: 40px auto; height: 15px; background: #eee; border-radius: 10px; }
        #chick-runner {
            position: absolute; left: 0%; top: -35px;
            font-size: 45px; transition: left 0.5s ease-out;
        }

        .question { font-size: 2.2rem; min-height: 120px; margin-bottom: 30px; word-break: keep-all; font-weight: 700; color: #555; }

        .btn-container { display: flex; flex-direction: column; gap: 20px; }
        
        button {
            padding: 25px;
            font-size: 1.8rem;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            font-family: 'Gaegu', cursive;
            transition: all 0.2s;
        }

        .btn-a { background-color: var(--main-pink); color: white; box-shadow: 0 8px 0 #E598AF; }
        .btn-b { background-color: var(--main-blue); color: white; box-shadow: 0 8px 0 #89B6DF; }
        button:active { transform: translateY(6px); box-shadow: none; }

        #result-page { display: none; }
        .animal-badge { font-size: 7rem; margin-bottom: 10px; }
        .mbti-tag { display: inline-block; padding: 5px 20px; background: #FFD966; border-radius: 30px; font-size: 1.5rem; font-weight: bold; }
        
        .info-card { 
            text-align: left; background: #FFF; border: 3px solid #FFD966; 
            padding: 20px; border-radius: 30px; margin-top: 25px; font-size: 1.4rem; 
        }
        .info-item { margin-bottom: 15px; }
        .info-title { color: #FF8BA7; font-weight: bold; font-size: 1.6rem; display: block; margin-bottom: 5px; }

        .job-box {
            background: #E1F5FE; padding: 15px; border-radius: 20px;
            display: flex; align-items: center; gap: 15px; margin-top: 10px;
        }
        .job-img { font-size: 3.5rem; }
    </style>
</head>
<body>

    <div id="game-container">
        <div id="start-page">
            <div style="font-size: 5rem;">🐾</div>
            <h1>유아 MBTI 검사<br>나와 닮은 동물 찾기</h1>
            <p style="font-size: 1.8rem;">나랑 꼭 닮은 동물 친구는<br>누구일까? 같이 가보자!</p>
            <button class="btn-a" onclick="startGame()" style="width: 100%; margin-top: 20px;">출발! (삐약삐약!)</button>
        </div>

        <div id="question-page" style="display: none;">
            <div class="progress-wrap">
                <div id="chick-runner">🐥</div>
            </div>
            <div id="question-text" class="question">로딩중...</div>
            <div class="btn-container">
                <button id="btnA" class="btn-a" onclick="handleChoice('A')"></button>
                <button id="btnB" class="btn-b" onclick="handleChoice('B')"></button>
            </div>
        </div>

        <div id="result-page">
            <h2 style="font-size: 2rem; margin: 0;">찾았다! 너는 바로...</h2>
            <div id="result-animal" class="animal-badge"></div>
            <div class="mbti-tag" id="mbti-type"></div>
            
            <div class="info-card">
                <div class="info-item">
                    <span class="info-title">⭐ 나의 멋진 점 (강점)</span>
                    <span id="strength-text"></span>
                </div>
                <div class="info-item">
                    <span class="info-title">💧 조심하면 좋은 점 (약점)</span>
                    <span id="weakness-text"></span>
                </div>
                <div class="info-item">
                    <span class="info-title">🚀 커서 무엇이 될까? (장래희망)</span>
                    <div class="job-box">
                        <div class="job-img" id="job-icon"></div>
                        <div id="job-text" style="font-weight: bold;"></div>
                    </div>
                </div>
            </div>
            <button class="btn-b" style="width:100%; margin-top:20px;" onclick="location.reload()">처음부터 다시 하기 🔄</button>
        </div>
    </div>

    <script>
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playSound(freq) {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + 0.2);
        }

       const allQuestions = [
    // T(사고) vs F(감정) - 선생님이 요청하신 스타일
    { q: "친구가 '나 속상해서 빵 샀어'라고 하면?", a: "무슨 빵 샀어? 맛있어?", b: "왜 속상했어? 속상하지 마~", type: "TF" },
    { q: "친구가 넘어져서 울고 있으면?", a: "어디가 아파? 약 발라야겠다!", b: "아이구 아팠겠다.. 토닥토닥", type: "TF" },
    { q: "내가 그린 그림을 친구가 보고 '안 예뻐'라고 하면?", a: "어디가 안 예뻐? 다시 그려야지", b: "나 열심히 그렸는데.. 너무 속상해", type: "TF" },
    { q: "친구가 장난감을 고장 냈을 때?", a: "선생님한테 고쳐달라고 하자!", b: "내 소중한 건데.. 너무 슬퍼", type: "TF" },
    { q: "새 옷을 입고 온 친구에게?", a: "우와! 옷에 공룡(하트) 그려져 있다!", b: "우와! 오늘 진짜 예쁘다/멋지다!", type: "TF" },

    // E(외향) vs I(내향)
    { q: "놀이터에 왔어! 너는?", a: "안녕! 우리 같이 놀자!", b: "친구들이 뭐 하나 지켜볼래", type: "EI" },
    { q: "선생님이 '누가 해볼까?' 물어보시면?", a: "저요 저요! 손을 번쩍 들어!", b: "부끄러워서 가만히 있을래", type: "EI" },
    { q: "주말에 뭐 하고 싶어?", a: "엄마 아빠랑 키즈카페 갈래!", b: "집에서 장난감 가지고 놀래", type: "EI" },
    { q: "우리 반에 새 친구가 왔어!", a: "먼저 가서 이름을 물어봐", b: "친구가 먼저 말 걸어줄 때까지 기다려", type: "EI" },
    { q: "생일 파티를 한다면?", a: "친구들을 아주 많이 초대할래!", b: "친한 친구 몇 명이랑만 놀래", type: "EI" },

    // S(감각) vs N(직관)
    { q: "구름을 보면 어떤 생각이 들어?", a: "하얗고 몽글몽글 솜사탕 같아!", b: "구름 타고 하늘 나라 여행 가고 싶어!", type: "SN" },
    { q: "블록 놀이를 할 때 너는?", a: "설명서 그림이랑 똑같이 만들래", b: "아무도 모르는 멋진 성을 만들래", type: "SN" },
    { q: "사과를 보면 뭐가 생각나?", a: "빨갛고 아삭아삭 맛있겠다!", b: "백설공주가 먹은 독사과 아닐까?", type: "SN" },
    { q: "길가에 예쁜 꽃이 피었어!", a: "꽃잎이 5개네? 분홍색이다!", b: "꽃들이 나한테 인사하는 것 같아!", type: "SN" },
    { q: "그림을 그릴 때 너는?", a: "내 눈앞에 있는 걸 똑같이 그려", b: "머릿속에 있는 상상을 그려", type: "SN" },

    // J(판단) vs P(인식)
    { q: "장난감을 다 가지고 놀았어!", a: "바구니에 바로바로 정리해!", b: "나중에 한꺼번에 정리할래", type: "JP" },
    { q: "내일 소풍 가는 날이야!", a: "가방을 미리미리 챙겨놓고 자", b: "아침에 일어나서 가방을 챙겨", type: "JP" },
    { q: "색칠 공부를 할 때 너는?", a: "선 밖으로 안 나가게 조심조심!", b: "내 마음대로 쓱쓱 자유롭게!", type: "JP" },
    { q: "유치원 갈 준비를 할 때?", a: "양말부터 옷까지 순서대로 입어", b: "그냥 손에 잡히는 것부터 입어", type: "JP" },
    { q: "선생님이랑 약속한 시간은?", a: "시계를 보며 늦지 않게 기다려", b: "놀다 보니까 시간이 다 됐네?", type: "JP" },

    // 추가 질문들 (혼합)
    { q: "친구가 화장실에 같이 가자고 하면?", a: "좋아! 같이 가자!", b: "난 지금 놀고 싶은데.. 혼자 가!", type: "EI" },
    { q: "급식에 내가 싫어하는 반찬이 나오면?", a: "몸에 좋으니까 꾹 참고 먹어볼래", b: "이거 먹으면 배가 아플 것 같아(상상)", type: "SN" },
    { q: "넘어진 친구가 '나 괜찮아'라고 하면?", a: "피 안 나니까 진짜 괜찮네!", b: "마음은 아플 텐데 참는 거구나?", type: "TF" },
    { q: "새로운 장난감을 받았어!", a: "어떻게 하는 건지 설명을 들어", b: "일단 이것저것 눌러보며 해봐", type: "SN" },
    { q: "자기 전에 내일 입을 옷을?", a: "미리 골라두면 마음이 편해", b: "아침에 기분 따라서 고를래", type: "JP" },
    { q: "비가 오면 무슨 생각이 들어?", a: "우산을 써야겠다! 장화 신어야지!", b: "하늘나라 요정이 울고 있나 봐", type: "SN" },
    { q: "친구가 나랑 똑같은 옷을 입고 오면?", a: "우와! 우리 커플 옷이다! 신나!", b: "어디서 샀어? 나랑 똑같네?", type: "TF" },
    { q: "놀이가 끝나기 5분 전이야!", a: "이제 정리할 준비를 미리 해", b: "5분이나 남았어! 더 신나게 놀래", type: "JP" },
    { q: "친구가 나한테만 비밀 이야기를 해주면?", a: "비밀? 다른 친구한테 말해도 돼?", b: "응! 아무한테도 말 안 할게!", type: "EI" },
    { q: "동화책 주인공이 모험을 떠나면?", a: "짐은 잘 챙겼을까? 걱정돼", b: "나도 같이 가고 싶다! 재밌겠다!", type: "SN" }
];

        let selectedQuestions = [];
        let currentIdx = 0;
        let scores = { E: 0, I: 0, S: 0, N: 0, T: 0, F: 0, J: 0, P: 0 };

        function startGame() {
            playSound(523);
            selectedQuestions = [...allQuestions].sort(() => 0.5 - Math.random()).slice(0, 10);
            document.getElementById('start-page').style.display = 'none';
            document.getElementById('question-page').style.display = 'block';
            showQuestion();
        }

        function showQuestion() {
            const q = selectedQuestions[currentIdx];
            document.getElementById('question-text').innerText = q.q;
            document.getElementById('btnA').innerText = q.a;
            document.getElementById('btnB').innerText = q.b;
            document.getElementById('chick-runner').style.left = (currentIdx * 10) + "%";
        }

        function handleChoice(choice) {
            playSound(choice === 'A' ? 659 : 783);
            const q = selectedQuestions[currentIdx];
            scores[q.type[choice === 'A' ? 0 : 1]]++;
            currentIdx++;
            if (currentIdx < 10) showQuestion();
            else {
                document.getElementById('chick-runner').style.left = "90%";
                setTimeout(showResult, 400);
            }
        }

        function showResult() {
            document.getElementById('question-page').style.display = 'none';
            document.getElementById('result-page').style.display = 'block';

            let mbti = (scores.E >= scores.I ? "E" : "I") + 
                       (scores.S >= scores.N ? "S" : "N") + 
                       (scores.T >= scores.F ? "T" : "F") + 
                       (scores.J >= scores.P ? "J" : "P");

            const resultsData = {
                "ENFP": { animal: "🐬", name: "반짝반짝 돌고래", strength: "상상력이 풍부하고 친구들을 정말 즐겁게 해줘요!", weakness: "가끔 집중하는 걸 깜빡할 수 있어요.", job: "마술사나 아이돌", jobIcon: "🎩" },
                "ENFJ": { animal: "🐶", name: "다정한 강아지", strength: "친구들을 잘 도와주고 마음을 잘 보듬어줘요!", weakness: "남의 시선을 너무 많이 신경 쓸 수 있어요.", job: "선생님이나 상담사", jobIcon: "🏫" },
                "ENTP": { animal: "🦊", name: "호기심 여우", strength: "새로운 아이디어가 넘치고 재치 있게 말해요!", weakness: "뒷마무리가 조금 부족할 수 있어요.", job: "발명가나 유튜버", jobIcon: "💡" },
                "ENTJ": { animal: "🦁", name: "용감한 사자", strength: "어려운 일도 씩씩하게 이끌고 책임감이 강해요!", weakness: "가끔 친구들의 기분을 놓칠 수 있어요.", job: "CEO나 비행기 조종사", jobIcon: "👨‍✈️" },
                "ESFP": { animal: "🦚", name: "춤추는 공작새", strength: "분위기를 밝게 만들고 에너지가 넘쳐요!", weakness: "계획을 세우는 걸 조금 귀찮아해요.", job: "연예인이나 파티플래너", jobIcon: "🎤" },
                "ESFJ": { animal: "🐝", name: "부지런한 꿀벌", strength: "친구들을 배려하고 약속을 아주 잘 지켜요!", weakness: "비판을 받으면 마음이 크게 흔들릴 수 있어요.", job: "간호사나 승무원", jobIcon: "💉" },
                "ESTP": { animal: "🐆", name: "날쌘 치타", strength: "행동이 빠르고 어떤 상황에서도 당당해요!", weakness: "가만히 앉아있는 걸 너무 힘들어해요.", job: "운동선수나 소방관", jobIcon: "🚒" },
                "ESTJ": { animal: "🐘", name: "듬직한 코끼리", strength: "규칙을 잘 지키고 주변을 깔끔하게 정리해요!", weakness: "변화에 적응하는 데 시간이 걸려요.", job: "군인이나 경찰관", jobIcon: "👮" },
                "INFP": { animal: "🐱", name: "꿈꾸는 고양이", strength: "자신만의 세계가 뚜렷하고 마음이 아주 깊어요!", weakness: "결정하는 걸 너무 힘들어할 때가 있어요.", job: "작가나 예술가", jobIcon: "🎨" },
                "INFJ": { animal: "🦄", name: "비밀의 유니콘", strength: "친구들의 마음을 조용히 잘 들어주고 이해해요!", weakness: "혼자만의 고민을 너무 깊게 할 수 있어요.", job: "작가나 심리학자", jobIcon: "📚" },
                "INTP": { animal: "🦉", name: "똑똑한 부엉이", strength: "생각하는 걸 좋아하고 아는 것이 아주 많아요!", weakness: "가끔 친구들과 대화하는 게 서툴 수 있어요.", job: "과학자나 프로그래머", jobIcon: "🖥️" },
                "INTJ": { animal: "🐯", name: "지혜로운 호랑이", strength: "목표를 세우면 끝까지 해내는 끈기가 있어요!", weakness: "남에게 도움 요청하는 걸 어려워해요.", job: "건축가나 연구원", jobIcon: "🏛️" },
                "ISFP": { animal: "🐑", name: "순한 양", strength: "예술적 감각이 뛰어나고 싸움을 싫어해요!", weakness: "거절하는 말을 잘 못 해서 힘들 수 있어요.", job: "요리사나 디자이너", jobIcon: "🍳" },
                "ISFJ": { animal: "🦌", name: "친절한 사슴", strength: "남을 돕는 걸 행복해하고 꼼꼼하게 챙겨요!", weakness: "자신의 고집을 잘 꺾지 않을 때가 있어요.", job: "도서관 사서나 제빵사", jobIcon: "🥖" },
                "ISTP": { animal: "🦝", name: "뚝딱뚝딱 너구리", strength: "손재주가 좋고 기계나 장난감을 잘 고쳐요!", weakness: "감정 표현이 조금 서툴 수 있어요.", job: "기술자나 카레이서", jobIcon: "🔧" },
                "ISTJ": { animal: "🐧", name: "우직한 펭귄", strength: "기억력이 좋고 정해진 시간을 딱딱 지켜요!", weakness: "융통성이 조금 부족할 수 있어요.", job: "회계사나 판사", jobIcon: "⚖️" }
            };

            const res = resultsData[mbti];
            document.getElementById('mbti-type').innerText = mbti + " " + res.name;
            document.getElementById('result-animal').innerText = res.animal;
            document.getElementById('strength-text').innerText = res.strength;
            document.getElementById('weakness-text').innerText = res.weakness;
            document.getElementById('job-text').innerText = res.job;
            document.getElementById('job-icon').innerText = res.jobIcon;
        }
    </script>
</body>
</html>

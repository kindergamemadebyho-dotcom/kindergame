<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>유치원의 하루</title>
    <style>
        body { font-family: 'Jua', sans-serif; background: #f0f0f0; text-align: center; }
        .tab-menu { display: flex; justify-content: center; gap: 10px; margin-top: 20px; }
        .tab-btn { padding: 15px 30px; font-size: 1.2rem; cursor: pointer; border: none; border-radius: 10px; background: white; transition: 0.3s; }
        .tab-btn.active { background: #FFB7C5; color: white; box-shadow: 0 5px 0 #FF8E9E; }
        .game-container { width: 90%; max-width: 900px; height: 700px; margin: 30px auto; background: white; border-radius: 20px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>
    <h1>🎮 유치원의 하루-by.Ho</h1>
    <div class="tab-menu">
        <button class="tab-btn active" onclick="loadGame('game1_pop.html', this)">🌸 벚꽃 팝콘</button>
        <button class="tab-btn" onclick="loadGame('game2_timer.html', this)">🐰 정리 타이머</button>
        <button class="tab-btn" onclick="loadGame('game3_memory.html', this)">❤️ 카드 기억</button>
    </div>

    <div class="game-container">
        <iframe id="gameFrame" src="game1_cherry.html"></iframe>
    </div>

    <script>
        function loadGame(url, btn) {
            document.getElementById('gameFrame').src = url;
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }
    </script>
</body>
</html>

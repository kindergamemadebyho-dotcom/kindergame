<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>유치원의 하루</title>

<style>
body { font-family: 'Jua', sans-serif; background:#f5f5f5; text-align:center; margin: 0; padding: 0; }

/* 상단 안내창 레이아웃 */
.info-banner {
    background-color: #fff4d1;
    border-bottom: 1px solid #ffe082;
    padding: 8px 20px;
    font-size: 0.85em;
    color: #856404;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.banner-text { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.banner-btns { display: flex; gap: 8px; flex-shrink: 0; }

/* ⭐ 가이드 팝업창 (구글 슬라이드 암베드용) */
#guideOverlay {
    display: none;
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: rgba(0,0,0,0.8);
    z-index: 2000;
}

#guideContent {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 80%; height: 80%;
    background: white;
    border-radius: 20px;
    overflow: hidden;
}

#closeBtn {
    position: absolute;
    top: 10px; right: 20px;
    font-size: 30px; color: white;
    cursor: pointer; z-index: 2001;
}

h1 { margin-top:20px; }

/* 카테고리 및 탭 메뉴 */
.top-menu { display:flex; justify-content:center; gap:10px; margin-top:15px; flex-wrap:wrap; }
.category-btn { padding:12px 20px; border:none; border-radius:15px; background:#ffd966; cursor:pointer; font-family: 'Jua'; }
.category-btn.active { background:#ffb347; color:white; }

.tab-menu { display:flex; justify-content:center; gap:10px; flex-wrap:wrap; margin-top:20px; }
.tab-btn { padding:10px 16px; border:none; border-radius:12px; background:white; cursor:pointer; font-family: 'Jua'; }
.tab-btn.active { background:#FFB7C5; color:white; }

/* 게임 화면 */
.game-container { width:95%; height:70vh; margin:20px auto; background:white; border-radius:20px; overflow:hidden; position: relative; }
iframe { width:100%; height:100%; border:none; }
.game-container:fullscreen { width:100vw; height:100vh; border-radius:0; }
</style>
</head>

<body>

<div id="guideOverlay">
    <span id="closeBtn" onclick="closeGuide()">&times;</span>
    <div id="guideContent">
        <iframe id="guideFrame" src="" allowfullscreen="true" mozallowfullscreen="true" webkitallowfullscreen="true"></iframe>
    </div>
</div>

<div class="info-banner">
    <div class="banner-text">📢 게임은 <b>전체화면</b> 권장 | 자유로운 수정·배포 가능 | 홈페이지 공사 중에 있습니다.</div>
    <div class="banner-btns">
        <button onclick="openGuide()" style="padding: 5px 12px; border: 1px solid #4A90E2; background: white; color: #4A90E2; border-radius: 15px; cursor: pointer; font-family: 'Jua';">📖 가이드 보기</button>
        <button onclick="toggleFullscreen()" style="padding: 5px 12px; border: none; background: #4A90E2; color: white; border-radius: 15px; cursor: pointer; font-family: 'Jua';">🖥️ 전체화면</button>
    </div>
</div>

<h1>🎮 유치원의 하루</h1>

<div class="top-menu">
    <button class="category-btn active" onclick="showCategory('basic', this)">📚 기본놀이</button>
    <button class="category-btn" onclick="showCategory('creative', this)">🎨 창의놀이</button>
    <button class="category-btn" onclick="showCategory('health', this)">🪥 안전 및 생활</button>
</div>

<div id="basic" class="tab-menu category">
    <button class="tab-btn active" onclick="loadGame('game1/game1_timer.html', this, 'https://docs.google.com/presentation/d/e/2PACX-1vQFYcbES22awYKp_hQHsxmLAZ7MjdLMIRFu5q33bBYHHcpdJXFZJiIjOXVE8iNQmzW3RKCeU9QEYkcr/pubembed?start=false&loop=false&delayms=3000')">🐰 정리 타이머</button>
    <button class="tab-btn" onclick="loadGame('game3/game3_memory.html', this, '여기에_구글주소_넣기')">❤️ 메모리 카드</button>
    <button class="tab-btn" onclick="loadGame('game4/game4_puzzle.html', this, '여기에_구글주소_넣기')">🧩 퍼즐 놀이</button>
    <button class="tab-btn" onclick="loadGame('game8/game8_roulette.html', this, '여기에_구글주소_넣기')">🎈 룰렛 놀이</button>
</div>

<div id="creative" class="tab-menu category" style="display:none;">
    <button class="tab-btn" onclick="loadGame('game5/game5_face.html', this, '여기에_구글주소_넣기')">📷 누구일까요?</button>
    <button class="tab-btn" onclick="loadGame('game6/game6_mix.html', this, '여기에_구글주소_넣기')">🌈 얼굴 섞기</button>
    <button class="tab-btn" onclick="loadGame('game2/game2_pop.html', this, '여기에_구글주소_넣기')">🌸 벚꽃을 잡아라!(웹캠필요)</button>
</div>

<div id="health" class="tab-menu category" style="display:none;">
    <button class="tab-btn" onclick="loadGame('game7/game7_strawberry.html', this, 'https://docs.google.com/presentation/d/e/2PACX-1vRgiIiOGcdpxYnQzxn-nfiLN3WLUu_85NfZiMQLU9nxUjfr3dHtA1HohbFQz_SKehwQOLNdXYextSnl/pubembed?start=false&loop=false&delayms=3000')">😋 좋은음식! 나쁜음식!(웹캠필요)</button>
    <button class="tab-btn" onclick="loadGame('game9/game9_rice.html', this, '여기에_구글주소_넣기')">🍚 오늘은 내가 영양사!</button>
    <button class="tab-btn" onclick="loadGame('game10/game10_teeth.html', this, '여기에_구글주소_넣기')">🪥 양치 대작전(웹캠필요)</button>
</div>

<div id="downloadArea" style="display: none; width: 95%; margin: 0 auto 10px auto; text-align: right;">
    <a href="foodwokr.png" download="foodwokr.png" style="display: inline-block; padding: 10px 20px; background: #FF9AA2; color: white; text-decoration: none; border-radius: 15px; font-family: 'Jua'; font-size: 1.1em; box-shadow: 2px 2px 5px rgba(0,0,0,0.1);">
        🖨️ 활동지 다운로드
    </a>
</div>

<div class="game-container" id="gameContainer">
    <iframe id="gameFrame" src="game1/game1_timer.html"></iframe>
</div>

<script>
// 🚨 범인 검거! 아래 주소가 예전 '음식' 주소로 되어 있어서 처음 실행 시 계속 음식이 나왔던 것입니다.
// 새로 만드신 '정리 타이머' 구글 슬라이드 주소로 교체했습니다.
let currentGuideUrl = 'https://docs.google.com/presentation/d/e/2PACX-1vQFYcbES22awYKp_hQHsxmLAZ7MjdLMIRFu5q33bBYHHcpdJXFZJiIjOXVE8iNQmzW3RKCeU9QEYkcr/pubembed?start=false&loop=false&delayms=3000';

function loadGame(url, btn, guideUrl){
    document.getElementById('gameFrame').src = url;
    document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');

    // 버튼을 누를 때마다 해당 게임의 가이드 주소로 정확히 업데이트됩니다.
    currentGuideUrl = guideUrl;

    const downloadArea = document.getElementById('downloadArea');
    if(url === 'game7/game7_strawberry.html') {
        downloadArea.style.display = 'block';
    } else {
        downloadArea.style.display = 'none';
    }
}

function openGuide() {
    if(currentGuideUrl && !currentGuideUrl.includes('여기에_')) {
        // 이제 currentGuideUrl에 담긴 '정리 타이머' 주소가 iframe에 들어갑니다.
        document.getElementById('guideFrame').src = currentGuideUrl;
        document.getElementById('guideOverlay').style.display = 'block';
    } else {
        alert("이 게임은 아직 준비된 가이드가 없습니다.");
    }
}

function closeGuide() {
    document.getElementById('guideOverlay').style.display = 'none';
    document.getElementById('guideFrame').src = ""; 
}

// ... 나머지 showCategory, toggleFullscreen 함수는 동일합니다 ...
</script>

</body>
</html>

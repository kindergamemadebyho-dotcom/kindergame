<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>유치원의 하루</title>

<style>
body { font-family: 'Jua', sans-serif; background:#f5f5f5; text-align:center; margin: 0; padding: 0; }

/* ⭐ 상단 안내창 (한 줄 구성) */
.info-banner {
    background-color: #fff4d1;
    border-bottom: 1px solid #ffe082;
    padding: 8px 10px;
    font-size: 0.85em;
    color: #856404;
    white-space: nowrap; /* 줄바꿈 방지 */
    overflow: hidden;
    text-overflow: ellipsis;
}

h1 { margin-top:20px; }

/* 상단 메뉴 */
.top-menu {
    display:flex;
    justify-content:center;
    align-items:center;
    gap:10px;
    margin-top:20px;
    flex-wrap:wrap;
}

/* 카테고리 */
.category-btn {
    padding:12px 20px;
    border:none;
    border-radius:15px;
    background:#ffd966;
    cursor:pointer;
}
.category-btn.active {
    background:#ffb347;
    color:white;
}

/* 전체화면 버튼 */
.fullscreen-btn {
    padding:12px 20px;
    border:none;
    border-radius:15px;
    background:#4A90E2;
    color:white;
    cursor:pointer;
}

/* 게임 버튼 */
.tab-menu {
    display:flex;
    justify-content:center;
    gap:10px;
    flex-wrap:wrap;
    margin-top:20px;
}
.tab-btn {
    padding:12px 18px;
    border:none;
    border-radius:12px;
    background:white;
    cursor:pointer;
}
.tab-btn.active {
    background:#FFB7C5;
    color:white;
}

/* 게임 화면 */
.game-container {
    width:95%;
    height:75vh;
    margin:20px auto;
    background:white;
    border-radius:20px;
    overflow:hidden;
}
iframe {
    width:100%;
    height:100%;
    border:none;
}

/* 전체화면 대응 */
.game-container:fullscreen {
    width:100vw;
    height:100vh;
    border-radius:0;
}
</style>
</head>

<body>

<div class="info-banner">
    📢 게임은 <b>전체화면</b>으로 즐겨주세요! &nbsp; | &nbsp; 본 콘텐츠는 <b>자유로운 수정, 배포 및 공유</b>가 가능합니다.
</div>

<h1>🎮 유치원의 하루</h1>

<div class="top-menu">
    <button class="category-btn active" onclick="showCategory('basic', this)">📚 기본놀이</button>
    <button class="category-btn" onclick="showCategory('creative', this)">🎨 창의놀이</button>
    <button class="category-btn" onclick="showCategory('health', this)">🪥 안전 및 생활</button>

    <button class="fullscreen-btn" onclick="toggleFullscreen()">🖥️ 전체화면</button>
</div>

<div id="basic" class="tab-menu category">
    <button class="tab-btn active" onclick="loadGame('game1/game1_timer.html', this)">🐰 정리 타이머</button>
    <button class="tab-btn" onclick="loadGame('game3/game3_memory.html', this)">❤️ 메모리 카드</button>
    <button class="tab-btn" onclick="loadGame('game4/game4_puzzle.html', this)">🧩 퍼즐 놀이</button>
    <button class="tab-btn" onclick="loadGame('game8/game8_roulette.html', this)">🎈 룰렛 놀이</button>
</div>

<div id="creative" class="tab-menu category" style="display:none;">
    <button class="tab-btn" onclick="loadGame('game5/game5_face.html', this)">📷 누구일까요?</button>
    <button class="tab-btn" onclick="loadGame('game6/game6_mix.html', this)">🌈 얼굴 섞기</button>
    <button class="tab-btn" onclick="loadGame('game2/game2_pop.html', this)">🌸 벚꽃을 잡아라!(웹캠필요)</button>
</div>

<div id="health" class="tab-menu category" style="display:none;">
    <button class="tab-btn" onclick="loadGame('game7/game7_strawberry.html', this)">😋 좋은음식! 나쁜음식!(웹캠필요)</button>
    <button class="tab-btn" onclick="loadGame('game9/game9_rice.html', this)">🍚 오늘은 내가 영양사!</button>
    <button class="tab-btn" onclick="loadGame('game10/game10_teeth.html', this)">🪥 치카치카 양치 대작전(웹캠필요)</button>
</div>

<div class="game-container" id="gameContainer">
    <iframe id="gameFrame" src="game1/game1_timer.html"></iframe>
</div>

<script>
function showCategory(id, btn){
    document.querySelectorAll('.category').forEach(c=>c.style.display='none');
    document.getElementById(id).style.display='flex';

    document.querySelectorAll('.category-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');

    // 첫 게임 자동 실행
    const firstBtn = document.getElementById(id).querySelector('.tab-btn');
    if(firstBtn){
        const onclickAttr = firstBtn.getAttribute('onclick');
        const match = onclickAttr.match(/'(.*?)'/);
        if(match) {
            loadGame(match[1], firstBtn);
        }
    }
}

function loadGame(url, btn){
    document.getElementById('gameFrame').src = url;
    document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
}

// 전체화면 기능
function toggleFullscreen() {
    const container = document.getElementById('gameContainer');

    if (!document.fullscreenElement) {
        container.requestFullscreen();
    } else {
        document.exitFullscreen();
    }
}
</script>

</body>
</html>

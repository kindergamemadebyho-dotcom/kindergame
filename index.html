<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>유치원의 하루</title>
    <style>
        /* 기본 스타일 */
        body { font-family: 'Jua', sans-serif; background: #f0f0f0; text-align: center; margin: 0; padding: 0; }
        h1 { margin-top: 20px; color: #333; }
        
        /* -------------------------------------------------- */
        /* 추가된 배너 스타일 (여기서 디자인을 수정할 수 있어요) */
        /* -------------------------------------------------- */
        .banner-container {
            background-color: #333; 
            color: white;           
            padding: 12px 20px;
            position: relative; 
            width: 100%;
            z-index: 9999;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
            font-size: 0.95rem;
            box-sizing: border-box; /* 패딩이 너비에 영향을 주지 않도록 설정 */
        }

        .banner-content {
            display: flex;
            gap: 20px;
            text-align: center;
        }

        .banner-text {
            margin: 0 5px;
        }

        .close-btn {
            background: none;
            border: none;
            color: #aaa;
            font-size: 24px;
            cursor: pointer;
            position: absolute;
            right: 20px;
            transition: 0.2s;
        }

        .close-btn:hover {
            color: white;
        }

        /* 모바일용 레이아웃 조정 */
        @media (max-width: 768px) {
            .banner-content {
                flex-direction: column;
                gap: 5px;
                padding-right: 30px;
            }
        }
        /* -------------------------------------------------- */

        .tab-menu { 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            gap: 10px; 
            margin-top: 20px; 
            flex-wrap: wrap; 
        }

        .tab-btn { 
            padding: 12px 25px; 
            font-size: 1.1rem; 
            cursor: pointer; 
            border: none; 
            border-radius: 10px; 
            background: white; 
            transition: 0.3s; 
            box-shadow: 0 4px 0 #ddd;
        }
        .tab-btn.active { background: #FFB7C5; color: white; box-shadow: 0 4px 0 #FF8E9E; }
        
        .fullscreen-btn { 
            padding: 12px 20px; 
            font-size: 1.1rem; 
            cursor: pointer; 
            border: none; 
            border-radius: 10px; 
            background: #4A90E2; 
            color: white; 
            transition: 0.3s; 
            box-shadow: 0 4px 0 #357ABD;
            margin-left: 20px;
        }
        .fullscreen-btn:hover { background: #357ABD; }
        .fullscreen-btn:active { transform: translateY(3px); box-shadow: none; }

        .game-container { 
            width: 95%; 
            max-width: 1200px; 
            height: 75vh; 
            margin: 20px auto; 
            background: transparent; 
            border-radius: 20px; 
            overflow: hidden; 
            box-shadow: 0 5px 15px rgba(0,0,0,0.05); 
        }
        iframe { width: 100%; height: 100%; border: none; border-radius: 20px; }
    </style>
</head>
<body>

<div id="notice-banner" class="banner-container">
    <div class="banner-content">
        <span class="banner-text">🎮 <strong>안내:</strong> 게임은 전체 화면으로 즐겨 주세요!</span>
        <span class="banner-text">🔓 수정, 배포, 공유 모두 가능합니다. (출처만 남겨 주세요)</span>
    </div>
    <button class="close-btn" onclick="closeBanner()">&times;</button>
</div>

    <h1>🎮 유치원의 하루-by.Ho</h1>
    
    <div class="tab-menu">
        <button class="tab-btn active" onclick="loadGame('game1/game1_timer.html', this)">🐰 정리 타이머</button>
        <button class="tab-btn" onclick="loadGame('game2/game2_pop.html', this)">🌸 벚꽃 팝콘(웹캠필요)</button>
        <button class="tab-btn" onclick="loadGame('game3/game3_memory.html', this)">❤️ 메모리 카드</button>
        <button class="tab-btn" onclick="loadGame('game4/game4_puzzle.html', this)">🧩퍼즐 놀이</button>
        <button class="tab-btn" onclick="loadGame('game5/game5_face.html', this)">📷얼굴 맞추기</button>
        <button class="tab-btn" onclick="loadGame('game6/game6_mix.html', this)">🌈얼굴 섞기</button>
        <button class="tab-btn" onclick="loadGame('game7/game7_strawberry.html', this)">🍓딸기 먹기(웹캠필요)</button>
        <button class="tab-btn" onclick="loadGame('game8/game8_roulette.html', this)">🎈팡팡 룰렛</button>
        
        <button class="fullscreen-btn" onclick="openGameFullscreen()">🖥️ 전체화면</button>
    </div>

    <div id="gameContainer" class="game-container">
        <iframe id="gameFrame" src="game1/game1_timer.html"></iframe>
    </div>

    <script>
        // 게임 화면 전환 함수
        function loadGame(url, btn) {
            document.getElementById('gameFrame').src = url;
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }

        // 전체화면 모드 함수
        function openGameFullscreen() {
            const elem = document.getElementById('gameFrame');
            if (elem.requestFullscreen) {
                elem.requestFullscreen();
            } else if (elem.webkitRequestFullscreen) {
                elem.webkitRequestFullscreen();
            } else if (elem.msRequestFullscreen) {
                elem.msRequestFullscreen();
            }
        }

        // 2. 배너 닫기 함수
        function closeBanner() {
            const banner = document.getElementById('notice-banner');
            banner.style.display = 'none';
        }
    </script>
</body>
</html>

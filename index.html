<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>유치원의 하루</title>

<style>
    body { font-family: 'Jua', sans-serif; background:#f5f5f5; text-align:center; margin: 0; padding: 0; }

    /* 상단 안내창 레이아웃 */
    .info-banner {
        background-color: #fff4d1;
        border-bottom: 1px solid #ffe082;
        padding: 8px 20px;
        font-size: 0.85em;
        color: #856404;
        display: flex;
        justify-content: space-between;
        align-items: center;
    }

    .banner-text { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .banner-btns { display: flex; gap: 8px; flex-shrink: 0; }

    /* ⭐ 가이드 팝업창 */
    #guideOverlay {
        display: none;
        position: fixed;
        top: 0; left: 0;
        width: 100%; height: 100%;
        background: rgba(0,0,0,0.8);
        z-index: 2000;
    }

    #guideContent {
        position: absolute;
        top: 50%; left: 50%;
        transform: translate(-50%, -50%);
        width: 80%; height: 80%;
        background: white;
        border-radius: 20px;
        overflow: hidden;
    }

    #closeBtn {
        position: absolute;
        top: 10px; right: 20px;
        font-size: 30px; color: white;
        cursor: pointer; z-index: 2001;
    }

    h1 { margin-top:20px; }

    /* 카테고리 및 탭 메뉴 */
    .top-menu { display:flex; justify-content:center; gap:10px; margin-top:15px; flex-wrap:wrap; }
    .category-btn { padding:12px 20px; border:none; border-radius:15px; background:#ffd966; cursor:pointer; font-family: 'Jua'; }
    .category-btn.active { background:#ffb347; color:white; }

    .tab-menu { display:flex; justify-content:center; gap:10px; flex-wrap:wrap; margin-top:20px; }
    .tab-btn { padding:10px 16px; border:none; border-radius:12px; background:white; cursor:pointer; font-family: 'Jua'; }
    .tab-btn.active { background:#FFB7C5; color:white; }

    /* 게임 화면 */
    .game-container { width:95%; height:70vh; margin:20px auto; background:white; border-radius:20px; overflow:hidden; position: relative; }
    iframe { width:100%; height:100%; border:none; }
    .game-container:fullscreen { width:100vw; height:100vh; border-radius:0; }

    /* 의견 팝업 */
    #ideaPopupOverlay {
        display: none;
        position: fixed;
        top: 0; left: 0;
        width: 100%; height: 100%;
        background: rgba(0,0,0,0.6);
        z-index: 3000;
    }

    #ideaPopupContent {
        position: absolute;
        top: 50%; left: 50%;
        transform: translate(-50%, -50%);
        width: 80%; max-width: 900px;
        height: 70%;
        background: white;
        border-radius: 20px;
        padding: 20px;
        text-align: center;
    }
</style>
</head>

<body>

<div id="ideaPopupOverlay" onclick="closeIdeaPopup()">
    <div id="ideaPopupContent" onclick="event.stopPropagation()">
        <h2>💬 선생님 의견 게시판</h2>
        <iframe src="https://docs.google.com/forms/d/e/1FAIpQLSebRg7bmVKsAHLo9DLbk-m3Ch-mssoevLtpdrG7N5SCvjBvew/viewform?embedded=true"
        style="width:100%; height:400px; border:none; border-radius:10px;"></iframe>
        <br>
        <button onclick="closeIdeaPopup()" style="margin-top:15px; padding:10px 20px; border:none; background:#ddd; border-radius:10px; cursor:pointer; font-family:'Jua';">닫기</button>
    </div>
</div>

<div id="guideOverlay">
    <span id="closeBtn" onclick="closeGuide()">&times;</span>
    <div id="guideContent">
        <iframe id="guideFrame" src="" allowfullscreen="true"></iframe>
    </div>
</div>

<div class="info-banner">
    <div class="banner-text">📢 게임은 <b>전체화면</b> 권장 | 자유로운 수정·배포 가능 | 홈페이지 공사 중에 있습니다.</div>
    <div class="banner-btns">
        <button onclick="openIdeaPopup()" style="padding: 5px 12px; border: 1px solid #FFB7C5; background: white; color: #FF6F91; border-radius: 15px; cursor: pointer; font-family: 'Jua';">💬 의견 남기기</button>
        <button onclick="openGuide()" style="padding: 5px 12px; border: 1px solid #4A90E2; background: white; color: #4A90E2; border-radius: 15px; cursor: pointer; font-family: 'Jua';">📖 가이드 보기</button>
        <button onclick="toggleFullscreen()" style="padding: 5px 12px; border: none; background: #4A90E2; color: white; border-radius: 15px; cursor: pointer; font-family: 'Jua';">🖥️ 전체화면</button>
    </div>
</div>

<h1>🎮 유치원의 하루</h1>

<div class="top-menu">
    <button class="category-btn active" onclick="showCategory('transition', this)">⏰ 전이 놀이</button>
    <button class="category-btn" onclick="showCategory('physical', this)">🏃 신체 놀이</button>
    <button class="category-btn" onclick="showCategory('mathscience', this)">🧪 수·과학 놀이</button>
    <button class="category-btn" onclick="showCategory('safety', this)">🚨 안전 놀이</button>
    <button class="category-btn" onclick="showCategory('language', this)">📖 언어 놀이</button>
</div>

<div id="transition" class="tab-menu category">
    <button class="tab-btn active" onclick="loadGame('game1/game1_timer.html', this, 'https://docs.google.com/presentation/d/e/2PACX-1vQFYcbES22awYKp_hQHsxmLAZ7MjdLMIRFu5q33bBYHHcpdJXFZJiIjOXVE8iNQmzW3RKCeU9QEYkcr/pubembed?start=false&loop=false&delayms=3000')">🐰 정리 타이머</button>
    <button class="tab-btn" onclick="loadGame('game8/game8_roulette.html', this, 'https://docs.google.com/presentation/d/e/2PACX-1vQLLXKyrQ5FBo7vhEzhfG2y1nY1gC3ntefbVzsYnA-gyoxTgQ4NRhE0fFyVXlQPc-ZGSnOn9KYHWn7W/pubembed?start=false&loop=false&delayms=3000')">🎈 룰렛 놀이</button>
    <button class="tab-btn" onclick="loadGame('game5/game5_face.html', this, '여기에_주소')">📷 누구일까요?</button>
    <button class="tab-btn" onclick="loadGame('game6/game6_mix.html', this, '여기에_주소')">🌈 얼굴 섞기</button>
    <button class="tab-btn" onclick="loadGame('game13/game13_mbti.html', this, '여기에_주소')">❓유아 MBTI</button>
</div>

<div id="physical" class="tab-menu category" style="display:none;">
    <button class="tab-btn" onclick="loadGame('game11/game11_pump.html', this, 'https://docs.google.com/presentation/d/e/2PACX-1vSMafpCLQaeJSBLphoT3_gibBEpG2FyDzhFbIpq1Q-Q58IpDMiZliZpuIkMivp3ftKxPNxrVHrhP7dS/pubembed?start=false&loop=false&delayms=3000')">🌺 봄 꽃 펌프 놀이(웹캠)</button>
    <button class="tab-btn" onclick="loadGame('game2/game2_pop.html', this, '여기에_주소')">🌸 벚꽃을 잡아라!(웹캠)</button>
</div>

<div id="mathscience" class="tab-menu category" style="display:none;">
    <button class="tab-btn" onclick="loadGame('game3/game3_memory.html', this, 'https://docs.google.com/presentation/d/e/2PACX-1vTbc2WhSJNK19EmAlEY_qsM6-b2CCRdZBWPdcG-TGKlpgK406DYY9-oeXCKlbnlFuHsR9jxcFlK_OS1/pubembed?start=false&loop=false&delayms=3000')">❤️ 메모리 카드</button>
    <button class="tab-btn" onclick="loadGame('game4/game4_puzzle.html', this, 'https://docs.google.com/presentation/d/e/2PACX-1vQTaIbxiczQzHekGvFYJeXHzaEnk8fWGT2rBOJBsqTh9-mB1wPdtlqLnS2fYtIfrWOQvdO7B9si7aCI/pubembed?start=false&loop=false&delayms=3000')">🧩 퍼즐 놀이</button>
</div>

<div id="safety" class="tab-menu category" style="display:none;">
    <button class="tab-btn" onclick="loadGame('game7/game7_strawberry.html', this, 'https://docs.google.com/presentation/d/e/2PACX-1vRgiIiOGcdpxYnQzxn-nfiLN3WLUu_85NfZiMQLU9nxUjfr3dHtA1HohbFQz_SKehwQOLNdXYextSnl/pubembed?start=false&loop=false&delayms=3000')">😋 좋은음식! 나쁜음식!(웹캠)</button>
    <button class="tab-btn" onclick="loadGame('game9/game9_rice.html', this, 'https://docs.google.com/presentation/d/e/2PACX-1vRglMrgAxiEg90xrBPWQkuYV08M7yyvI-raq-90wFqsdao_WwWITe50KJcku2kgv-VoSRA_vBX3Pg3B/pubembed?start=false&loop=false&delayms=3000')">🍚 오늘은 내가 영양사!</button>
    <button class="tab-btn" onclick="loadGame('game10/game10_teeth.html', this, '여기에_주소')">🪥 양치 대작전</button>
</div>

<div id="language" class="tab-menu category" style="display:none;">
    <button class="tab-btn" onclick="loadGame('game12/game12_crossgame.html', this, '여기에_주소')">👾 이름 크로스 게임</button>
</div>

<div id="downloadArea" style="display: none; width: 95%; margin: 10px auto; text-align: right;">
    <a id="downloadLink" href="#" style="display: inline-block; padding: 10px 20px; background: #FF9AA2; color: white; text-decoration: none; border-radius: 15px; font-family: 'Jua'; box-shadow: 2px 2px 5px rgba(0,0,0,0.1);">
        🖨️ 활동지/도안 다운로드
    </a>
</div>

<div class="game-container" id="gameContainer">
    <iframe id="gameFrame" src="game1/game1_timer.html"></iframe>
</div>

<script>
let currentGuideUrl = 'https://docs.google.com/presentation/d/e/2PACX-1vQFYcbES22awYKp_hQHsxmLAZ7MjdLMIRFu5q33bBYHHcpdJXFZJiIjOXVE8iNQmzW3RKCeU9QEYkcr/pubembed?start=false&loop=false&delayms=3000';

function loadGame(url, btn, guideUrl){
    document.getElementById('gameFrame').src = url;
    
    // 버튼 활성화 표시
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');

    currentGuideUrl = guideUrl;

    const downloadArea = document.getElementById('downloadArea');
    const downloadLink = document.getElementById('downloadLink');

    // 특정 게임에서만 다운로드 버튼 표시
    if(url === 'game7/game7_strawberry.html') {
        downloadArea.style.display = 'block';
        downloadLink.href = 'foodwokr.png';
        downloadLink.setAttribute('download', '음식_활동지.png');
    } 
    else if(url === 'game11/game11_pump.html') {
        downloadArea.style.display = 'block';
        downloadLink.href = 'spring.zip';
        downloadLink.setAttribute('download', '봄꽃펌프_발판도안.zip');
    } 
    else {
        downloadArea.style.display = 'none';
    }
}

function openGuide() {
    if(currentGuideUrl && !currentGuideUrl.includes('여기에_')) {
        document.getElementById('guideFrame').src = currentGuideUrl;
        document.getElementById('guideOverlay').style.display = 'block';
    } else {
        alert("이 게임은 아직 준비된 가이드가 없습니다.");
    }
}

function closeGuide() {
    document.getElementById('guideOverlay').style.display = 'none';
    document.getElementById('guideFrame').src = ""; 
}

function showCategory(categoryId, btn) {
    const categories = document.querySelectorAll('.category');
    categories.forEach(cat => cat.style.display = 'none');

    const targetCategory = document.getElementById(categoryId);
    if (targetCategory) targetCategory.style.display = 'flex';

    document.querySelectorAll('.category-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
}

function toggleFullscreen() {
    const elem = document.getElementById('gameContainer');
    if (!document.fullscreenElement) {
        if (elem.requestFullscreen) elem.requestFullscreen();
        else if (elem.webkitRequestFullscreen) elem.webkitRequestFullscreen();
    } else {
        if (document.exitFullscreen) document.exitFullscreen();
    }
}

function openIdeaPopup() {
    document.getElementById('ideaPopupOverlay').style.display = 'block';
}

function closeIdeaPopup() {
    document.getElementById('ideaPopupOverlay').style.display = 'none';
}
</script>

</body>
</html>

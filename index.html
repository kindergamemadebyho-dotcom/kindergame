<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>유치원의 하루</title>
    <style>
        body { font-family: 'Jua', sans-serif; background: #f0f0f0; text-align: center; margin: 0; padding: 0; }
        h1 { margin-top: 20px; color: #333; }
        
        .tab-menu { 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            gap: 10px; 
            margin-top: 20px; 
            flex-wrap: wrap; 
        }

        .tab-btn { 
            padding: 12px 25px; 
            font-size: 1.1rem; 
            cursor: pointer; 
            border: none; 
            border-radius: 10px; 
            background: white; 
            transition: 0.3s; 
            box-shadow: 0 4px 0 #ddd;
        }
        .tab-btn.active { background: #FFB7C5; color: white; box-shadow: 0 4px 0 #FF8E9E; }
        
        .fullscreen-btn { 
            padding: 12px 20px; 
            font-size: 1.1rem; 
            cursor: pointer; 
            border: none; 
            border-radius: 10px; 
            background: #4A90E2; 
            color: white; 
            transition: 0.3s; 
            box-shadow: 0 4px 0 #357ABD;
            margin-left: 20px;
        }
        .fullscreen-btn:hover { background: #357ABD; }
        .fullscreen-btn:active { transform: translateY(3px); box-shadow: none; }

        .game-container { 
            width: 95%; 
            max-width: 1200px; 
            height: 75vh; 
            margin: 20px auto; 
            background: white; 
            border-radius: 20px; 
            overflow: hidden; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.1); 
            border: 5px solid #fff;
        }
        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>
    <h1>🎮 유치원의 하루-by.Ho</h1>
    
    <div class="tab-menu">
        <button class="tab-btn active" onclick="loadGame('game1_timer.html', this)">🐰 정리 타이머</button>
        <button class="tab-btn" onclick="loadGame('game2_pop.html', this)">🌸 벚꽃 팝콘</button>
        <button class="tab-btn" onclick="loadGame('game3_memory.html', this)">❤️ 봄날의 기억</button>
        
        <button class="fullscreen-btn" onclick="openGameFullscreen()">🖥️ 전체화면</button>
    </div>

    <div id="gameContainer" class="game-container">
        <iframe id="gameFrame" src="game1_timer.html"></iframe>
    </div>

    <script>
        // 게임 전환 함수
        function loadGame(url, btn) {
            document.getElementById('gameFrame').src = url;
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }

        // ✨ 게임 화면만 전체화면으로 만드는 함수
        function openGameFullscreen() {
            // 대상 요소를 'page' 전체(documentElement)가 아닌 'gameContainer'로 지정
            const elem = document.getElementById('gameContainer');
            
            if (elem.requestFullscreen) {
                elem.requestFullscreen();
            } else if (elem.webkitRequestFullscreen) { /* Safari/iOS */
                elem.webkitRequestFullscreen();
            } else if (elem.msRequestFullscreen) { /* IE11 */
                elem.msRequestFullscreen();
            }
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>냠냠! 딸기 먹기 게임</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
</head>
<body>
    <video id="input_video" style="display:none;"></video>
    <canvas id="canvas"></canvas>
    
    <div id="score">🍓 딸기 점수: 0</div>
    <button id="backBtn" style="display:none;">처음으로</button>

    <div id="startContainer">
        <h1>🍓 딸기 많이 먹기!</h1>
        <div id="setup-menu">
            <div class="option-item">
                인원 설정
                <select id="playerSelect">
                    <option value="1">1명</option>
                    <option value="2">2명</option>
                    <option value="3">3명</option>
                </select>
            </div>
            <div class="option-item">
                난이도
                <select id="levelSelect">
                    <option value="1">쉬움</option>
                    <option value="2">보통 (초록딸기)</option>
                    <option value="3">어려움 (초록딸기 많음)</option>
                </select>
            </div>
            <div class="option-item">
    게임 시간
    <select id="timeOption">
        <option value="30">30초</option>
        <option value="60">1분</option>
        <option value="120">2분</option>
        <option value="180">3분</option>
        <option value="240">4분</option>
        <option value="300">5분</option>
    </select>
</div>
        </div>
        <button id="startBtn">게임 시작!</button>
    </div>

    <audio id="eatSound" src="eat.mp3"></audio>

    <script src="game.js"></script>
</body>
</html>
